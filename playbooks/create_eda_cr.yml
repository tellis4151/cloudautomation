---
- name: Create ServiceNow Change for Cloud Server Provisioning
  hosts: localhost
  gather_facts: false

  tasks:
  - name: Create Change Request Provision Cloud Instance
    servicenow.itsm.change_request:
#      instance: 
#        host: "{{ host }}"
#        username: "{{ username }}"
#        password: "{{ password }}"
      type: standard
      state: new
      short_description: New EC2 Cloud Instance
      description: Provision New Cloud Compute Resource
      priority: moderate
      category: network
      risk: low
      impact: low
      assignment_group: Network
